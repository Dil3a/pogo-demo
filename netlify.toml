[build]
  command = "pnpm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Serve portail.html at /portail directly from public folder
[[redirects]]
  from = "/portail"
  to = "/portail.html"
  status = 200

[[redirects]]
  from = "/portail.html"
  to = "/portail.html"
  status = 200
